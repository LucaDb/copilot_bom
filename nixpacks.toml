#################

providers = ['node']
buildImage = 'ghcr.io/railwayapp/nixpacks:latest'

[variables]
CI = 'true'
NIXPACKS_METADATA = 'node'
NODE_ENV = 'production'
NODE_VERSION = '20'
NIXPACKS_NODE_VERSION = '20.x'
NPM_CONFIG_FUND = 'false'
NPM_CONFIG_UPDATE_NOTIFIER = 'false'

[phases.setup]
nixPkgs = ['nodejs_20', 'turbo']

[phases.install]
dependsOn = ['setup']
cmds = ['npm i @websolutespa/bom-cli -g', 'npm i']

